<!DOCTYPE html>
<html>
<head>
<title>TMDB Movie Predictor</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#141e30,#243b55);
color:white;
text-align:center;
padding-top:60px;
}

.container{
background:#ffffff10;
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#ff4b2b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff416c;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<h1>TMDB Movie Performance Predictor</h1>

<div class="container">

<form action="/predict" method="post">

<input type="number" name="runtime" placeholder="Runtime (minutes)" required>

<input type="number" name="budget" placeholder="Budget" required>

<input type="number" name="vote_count" placeholder="Vote Count" required>

<button type="submit">Predict</button>

</form>

<div class="result">

{% if revenue %}
<p>Predicted Revenue: {{revenue}}</p>
<p>Predicted Popularity: {{popularity}}</p>
{% endif %}

</div>

</div>

</body>
</html>
